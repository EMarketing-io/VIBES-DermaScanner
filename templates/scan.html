<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Start AI Face Scan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='scan.css') }}">
</head>

<body>

<div class="page scan-page-fit">

    <nav class="top-nav scan-nav">
        <div class="brand">
            <div class="brand-mark">V</div>
            <div>
                <h3>Vibes AI DermaScan</h3>
                <span>Face Scan • Upload • Analyze</span>
            </div>
        </div>

        <a href="/" class="nav-btn">Home</a>
    </nav>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form action="/analyze" method="POST" enctype="multipart/form-data" class="scan-center-form">

        <section class="top-face-scanner">
            <div class="premium-scanner square-face-scanner">
                <div class="scanner-frame">

                    <video id="video" autoplay playsinline muted class="full-video"></video>
                    <canvas id="canvas" style="display:none;"></canvas>

                    <div class="demo-face scanner-demo-face">
                        <div class="face-oval"></div>
                        <div class="eye left-eye"></div>
                        <div class="eye right-eye"></div>
                        <div class="nose"></div>
                        <div class="mouth"></div>
                    </div>

                    <div class="scanner-overlay-ui">
                        <div class="scanner-blue-glow"></div>
                        <div class="scanner-line"></div>
                        <div class="scanner-grid"></div>

                        <div class="floating-node n1"></div>
                        <div class="floating-node n2"></div>
                        <div class="floating-node n3"></div>
                        <div class="floating-node n4"></div>

                        <div class="scanner-status">
                            <span></span> AI Face Scanner Ready
                        </div>
                    </div>

                </div>
            </div>
        </section>

        <input type="hidden" name="camera_image_1" id="camera_image_1">
        <input type="hidden" name="camera_image_2" id="camera_image_2">
        <input type="hidden" name="camera_image_3" id="camera_image_3">

        <section class="scan-action-row">
            <button type="button" onclick="startCamera()">Start Camera</button>
            <button type="button" onclick="captureImage()" class="secondary-btn">Capture</button>
            <button type="submit">Analyze Capture</button>
        </section>

        <section class="bottom-upload-panel">
            <div class="upload-heading">
                <h2>Upload Image</h2>
                <p>Select a clear face image from your device.</p>
            </div>

            <div class="single-upload-area">
                <label class="single-upload-card">
                    <span>Choose Face Image</span>
                    <input type="file" name="face_images" accept="image/*">
                </label>

                <button type="submit" class="upload-analyze-btn">
                    Analyze Uploaded Image
                </button>
            </div>
        </section>

        <p class="fit-note">
            AI screening is only for basic guidance. Please consult a certified dermatologist for diagnosis.
        </p>

    </form>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
